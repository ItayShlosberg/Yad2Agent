fields:
  - name: intent
    description: "buy or rent"
    required: true
    priority: 1

  - name: budget_range
    description: "budget_min / budget_max in ILS"
    required: true
    priority: 2

  - name: timeframe
    description: "urgency / timeframe (immediate, 1-3 months, flexible)"
    required: true
    priority: 3

  - name: wants_visit
    description: "interest in visiting the property"
    required: true
    priority: 4

  - name: equity_amount
    description: "cash / equity available"
    required: true
    priority: 5

scoring:
  points_per_field: 15
  visit_bonus: 10
  red_flag_penalty: 15
  max_score: 100

status_transitions:
  qualified_max_missing: 2
