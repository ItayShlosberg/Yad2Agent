server:
  host: "0.0.0.0"
  port: 8000
  reload: true

logging:
  level: INFO
  format: "%(asctime)s  %(levelname)-8s  %(name)s  %(message)s"

  file_enabled: true
  file_path: logs/agent.log
  file_max_bytes: 5242880       # 5 MB per file
  file_backup_count: 5          # keep 5 rotated files

  json_enabled: true            # also write structured JSON logs
  json_path: logs/agent.jsonl
  json_max_bytes: 10485760      # 10 MB per file
  json_backup_count: 3

paths:
  storage_dir: storage
  data_dir: data
  active_property: property_1
